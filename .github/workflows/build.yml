name: Build extension bundle

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build minified bundle
        run: bash scripts/build.sh

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-controller-bundle
          path: video-controller-v*.zip

      - name: Read manifest version
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      # Creates the tag + release automatically from the manifest version.
      # Re-pushing main without bumping the version updates the same
      # release's zip instead of creating a new one.
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: video-controller-v*.zip
          generate_release_notes: true
